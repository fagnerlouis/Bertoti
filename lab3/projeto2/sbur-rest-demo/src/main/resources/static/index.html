<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>☕ Café pelé</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 32px;
      color: #f0a500;
      letter-spacing: 1px;
    }

    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 560px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .card h2 {
      font-size: 1rem;
      color: #f0a500;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #0f3460;
      background: #0f3460;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #f0a500;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover {
      opacity: 0.85;
    }

    button:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: #f0a500;
      color: #1a1a2e;
    }

    .btn-danger {
      background: #e94560;
      color: #fff;
    }

    .btn-secondary {
      background: #0f3460;
      color: #e0e0e0;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    #response {
      margin-top: 12px;
      background: #0a0a1a;
      border-radius: 8px;
      padding: 14px;
      font-size: 0.85rem;
      color: #a0e0a0;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 40px;
      border: 1px solid #0f3460;
    }

    #list-container {
      margin-top: 12px;
    }

    .coffee-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0f3460;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 8px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }

      to {
        opacity: 1;
      }
    }

    .coffee-item span {
      font-size: 0.95rem;
    }

    .coffee-item .id-badge {
      background: #f0a500;
      color: #1a1a2e;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-right: 10px;
    }
  </style>
</head>

<body>

  <h1>☕ Café pelé</h1>

  <!-- LIST ALL -->
  <div class="card">
    <h2>Listar Todos os Cafés</h2>
    <div class="btn-row">
      <button class="btn-primary" id="btn-list">GET /coffees</button>
    </div>
    <div id="list-container"></div>
  </div>

  <!-- GET BY ID -->
  <div class="card">
    <h2>Buscar Café por ID</h2>
    <input type="number" id="get-id" placeholder="ID do café" min="1" />
    <div class="btn-row">
      <button class="btn-primary" id="btn-get">GET /coffees/{id}</button>
    </div>
    <div id="response-get" class="response-box" style="display:none"></div>
  </div>

  <!-- CREATE -->
  <div class="card">
    <h2>Criar Novo Café</h2>
    <input type="text" id="post-name" placeholder="Nome do café" />
    <div class="btn-row">
      <button class="btn-primary" id="btn-post">POST /coffees</button>
    </div>
    <div id="response-post" class="response-box" style="display:none"></div>
  </div>

  <!-- UPDATE -->
  <div class="card">
    <h2>Atualizar Café</h2>
    <input type="number" id="put-id" placeholder="ID do café" min="1" />
    <input type="text" id="put-name" placeholder="Novo nome" />
    <div class="btn-row">
      <button class="btn-secondary" id="btn-put">PUT /coffees/{id}</button>
    </div>
    <div id="response-put" class="response-box" style="display:none"></div>
  </div>

  <!-- DELETE -->
  <div class="card">
    <h2>Remover Café</h2>
    <input type="number" id="delete-id" placeholder="ID do café" min="1" />
    <div class="btn-row">
      <button class="btn-danger" id="btn-delete">DELETE /coffees/{id}</button>
    </div>
    <div id="response-delete" class="response-box" style="display:none"></div>
  </div>

  <script>
    const API = '/coffees';

    function showResponse(boxId, data, isError) {
      const box = document.getElementById(boxId);
      box.style.display = 'block';
      box.style.color = isError ? '#e94560' : '#a0e0a0';
      box.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
    }

    // GET ALL
    document.getElementById('btn-list').addEventListener('click', async () => {
      const container = document.getElementById('list-container');
      container.innerHTML = '<p style="color:#888;margin-top:10px">Carregando...</p>';
      try {
        const res = await fetch(API);
        const data = await res.json();
        if (!data.length) {
          container.innerHTML = '<p style="color:#888;margin-top:10px">Nenhum café encontrado.</p>';
          return;
        }
        container.innerHTML = '';
        data.forEach(c => {
          const div = document.createElement('div');
          div.className = 'coffee-item';
          div.innerHTML = `<span><span class="id-badge">#${c.id}</span>${c.name}</span>`;
          container.appendChild(div);
        });
      } catch (e) {
        container.innerHTML = `<p style="color:#e94560;margin-top:10px">Erro: ${e.message}</p>`;
      }
    });

    // GET BY ID
    document.getElementById('btn-get').addEventListener('click', async () => {
      const id = document.getElementById('get-id').value;
      if (!id) return showResponse('response-get', 'Informe um ID.', true);
      try {
        const res = await fetch(`${API}/${id}`);
        if (res.status === 404 || res.headers.get('content-length') === '0') {
          showResponse('response-get', 'Café não encontrado.', true);
          return;
        }
        const data = await res.json();
        showResponse('response-get', data, false);
      } catch (e) {
        showResponse('response-get', `Erro: ${e.message}`, true);
      }
    });

    // POST
    document.getElementById('btn-post').addEventListener('click', async () => {
      const name = document.getElementById('post-name').value.trim();
      if (!name) return showResponse('response-post', 'Informe um nome.', true);
      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });
        const data = await res.json();
        showResponse('response-post', data, false);
        document.getElementById('post-name').value = '';
      } catch (e) {
        showResponse('response-post', `Erro: ${e.message}`, true);
      }
    });

    // PUT
    document.getElementById('btn-put').addEventListener('click', async () => {
      const id = document.getElementById('put-id').value;
      const name = document.getElementById('put-name').value.trim();
      if (!id || !name) return showResponse('response-put', 'Informe o ID e o novo nome.', true);
      try {
        const res = await fetch(`${API}/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: Number(id), name })
        });
        const data = await res.json();
        showResponse('response-put', data, !res.ok);
      } catch (e) {
        showResponse('response-put', `Erro: ${e.message}`, true);
      }
    });

    // DELETE
    document.getElementById('btn-delete').addEventListener('click', async () => {
      const id = document.getElementById('delete-id').value;
      if (!id) return showResponse('response-delete', 'Informe um ID.', true);
      try {
        await fetch(`${API}/${id}`, { method: 'DELETE' });
        showResponse('response-delete', `Café #${id} removido com sucesso.`, false);
        document.getElementById('delete-id').value = '';
      } catch (e) {
        showResponse('response-delete', `Erro: ${e.message}`, true);
      }
    });
  </script>

</body>

</html>
